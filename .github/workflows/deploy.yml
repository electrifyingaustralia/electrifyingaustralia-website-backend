name: Electrifying Australia Backend Deployment CI/CD.


on:
  push:
    branches: [deploy]


env:
  AWS_REGION: ap-southeast-1
  ECS_CLUSTER: electrifyingaustralia-cluster
  ECS_SERVICE: backend-service
  TASK_DEFINITION: task-definition.json
  CONTAINER_NAME: backend
  BUILD_IMAGE: new-build:latest
  IMAGE: 328211722603.dkr.ecr.ap-southeast-1.amazonaws.com/electrifyingaustralia/backend:latest


jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build Docker Image
        run: |
          docker build -t $BUILD_IMAGE .

      - name: Add New Tag to Docker Image
        run: |
          docker tag $BUILD_IMAGE $IMAGE

      - name: Show All Docker Images
        run: |
          docker images

      - name: RUN Docker Image in Container
        run: |
          docker run -d -p 8080:8000 $IMAGE

      - name: Container Logs
        run: |
          docker logs $(docker ps -q --filter ancestor=$IMAGE)

      - name: Ping Container
        run: |
          sleep 10
          curl -I http://localhost:8080/admin/login/
