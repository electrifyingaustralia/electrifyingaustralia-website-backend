apiVersion: apps/v1
kind: Deployment
metadata:
  name: electrifying-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: electrifying-backend
  template:
    metadata:
      labels:
        app: electrifying-backend
    spec:
      containers:
      - name: backend
        image: nginx:alpine # We use temporary Nginx for now; Jenkins will update this later!
        ports:
        - containerPort: 80
        env: # 👈 Just add this database connection block right here!
        - name: DB_CONNECTION
          value: "mysql"
        - name: DB_HOST
          value: "mysql-service" # Connects directly to your cluster's database service
        - name: DB_PORT
          value: "3306"
        - name: DB_DATABASE
          value: "Electrifying-Australia" # 👈 Change this to your database name
        - name: DB_USERNAME
          value: "laravel_user"
        - name: DB_PASSWORD
          value: "Sabbir99@" # 👈 Change this to your database password
---
apiVersion: v1
kind: Service
metadata:
  name: electrifying-backend-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: electrifying-backend
