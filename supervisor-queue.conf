[program:laravel-electrifying-australia-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/api.electrifyingaustralia/artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/api.electrifyingaustralia/storage/logs/laravel-queue.log
stopwaitsecs=3600
